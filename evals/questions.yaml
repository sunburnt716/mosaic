# Labeled answerability eval set — the measured basis for "should I broaden sources?"
#
# Each question is tagged with two labels the harness scores against:
#
#   intent — what kind of question it is:
#     news-synthesis           blend recent coverage of a topic into a cited summary
#     point-in-time-statistic  a specific figure/fact as of a moment (earnings, a filing item)
#     ticker-specific          news about one company/symbol
#     out-of-scope             the system should NOT answer from the corpus
#
#   expected — what the pipeline *should* do:
#     answer    produce a cited answer (in-scope; failure here => "in-scope-but-thin")
#     abstain   decline: off-domain, no corpus grounding possible
#     redirect  decline with a mission nudge: advice/forecasting the product never gives
#
# The split is deliberate: most in-scope questions are tagged `answer` so a thin corpus
# surfaces them as "in-scope-but-thin" (=> add feeds, measure the delta). Out-of-scope
# questions are tagged `abstain`/`redirect` so an over-eager answer surfaces as
# "out-of-scope-router-missed" (=> router work, no new sources). See evals/harness.py.
#
# Grounded in the live sources (SEC EDGAR 8-K discovery feed + FT markets). Extend freely —
# this is data, not code; re-running after adding questions or feeds is how deltas are measured.

questions:
  # ---- news-synthesis (answer) ----
  - id: ns-01
    question: "What's the latest news on European inflation?"
    intent: news-synthesis
    expected: answer
  - id: ns-02
    question: "What are markets watching ahead of the Federal Reserve's next decision?"
    intent: news-synthesis
    expected: answer
  - id: ns-03
    question: "What's happening in the semiconductor and memory-chip market?"
    intent: news-synthesis
    expected: answer
  - id: ns-04
    question: "How are European energy prices affecting the markets outlook?"
    intent: news-synthesis
    expected: answer
  - id: ns-05
    question: "What's the recent activity in the IPO and public-listing market?"
    intent: news-synthesis
    expected: answer
  - id: ns-06
    question: "What regulatory scrutiny are large cloud-computing providers facing?"
    intent: news-synthesis
    expected: answer
  - id: ns-07
    question: "What are analysts saying about banks and brokerages right now?"
    intent: news-synthesis
    expected: answer
  - id: ns-08
    question: "What's the latest on cryptocurrency regulation?"
    intent: news-synthesis
    expected: answer
    note: "Likely thin — no dedicated crypto source yet. A good add-feeds signal."

