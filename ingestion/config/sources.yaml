# Source registry — the single place where all ingestion sources are declared.
#
# This file is DATA, not code. Each entry is validated against SourceConfig
# (core/source_config.py) at startup. The engine loads this file; no restart
# or code change is needed to add, remove, or disable a source.
#
# Adding a source: add an entry here. No new code needed.
# Disabling a source: set enabled: false. The entry is preserved for history.
#
# Tier reference (stamped at ingest on every Document, never inferred later):
#   0 — primary / regulatory  : SEC EDGAR, Fed releases, exchange notices
#   1 — major wire services   : Reuters, AP, Bloomberg wire
#   2 — quality financial press: WSJ, FT, Barron's
#   3 — signal / high-volume  : Reddit, Twitter/X, StockTwits (leading indicator only)
#
# poll_interval format: a positive duration string — "30s", "5m", "1h", "1h30m".
# doc_type controls downstream chunking: "article" = by paragraph, "filing" = by section.
# field_mappings: per-source OVERRIDE of which key in the adapter's output dict holds a
#   Document field, e.g. {"body": "summary"}. Each adapter (rss, rest_json) is format-driven
#   and already yields a standard output shape (url, title, raw_body, published,
#   source_article_id) regardless of source, so this is normally {} — only set it for a
#   source whose entries genuinely don't fit that shape.
# transform: optional registered per-source correction (ingestion/pipeline/transforms.py)
#   applied to each raw entry before field-mapping.
# expects: quality-gate hints — which output fields must be non-empty for this source
#   (e.g. {"body": false} for a metadata-only discovery feed).
# auth: adapter-specific credentials. In production, inject secrets via env vars
#   rather than storing them here in plain text.
#
# Sources are listed in tier order (most trusted first) for readability.

sources:
  # --------------------------------------------------------------------------
  # Tier 0 — Primary / Regulatory
  # --------------------------------------------------------------------------

  # A specialized EDGAR adapter (querying efts.sec.gov full-text search) was tried and
  # retired: that endpoint has field-name mismatches and returns no filing bodies (see
  # adapters/edgar.py). EDGAR discovery instead runs through the generic RSS adapter
  # pointed at the getcurrent Atom feed, with a transform that cleans the entry title.
  - name: sec-edgar
    adapter: rss
    tier: 0
    url: https://www.sec.gov/cgi-bin/browse-edgar?action=getcurrent&type=8-K&company=&dateb=&owner=include&count=100&output=atom
    poll_interval: "2m"
    doc_type: filing
    transform: edgar_filing_url
    field_mappings: {}
    auth: {}
    enabled: true
    headers:
      User-Agent: "MosaicRAG contact@example.com"
    expects:
      title: true
      url: true
      body: false

  # --------------------------------------------------------------------------
  # Tier 1 — Major Wire Services
  # --------------------------------------------------------------------------

  - name: reuters-business-rss
    adapter: rss
    tier: 1
    url: https://feeds.reuters.com/reuters/businessNews
    poll_interval: "5m"
    doc_type: article
    field_mappings: {}
    auth: {}
    enabled: true
    expects:
      title: true
      url: true
      body: true

  - name: ap-markets-rss
    adapter: rss
    tier: 1
    url: https://apnews.com/hub/financial-markets/rss
    poll_interval: "5m"
    doc_type: article
    field_mappings: {}
    auth: {}
    expects:
      title: true
      url: true
      body: true
    # Disabled until feed URL is confirmed stable.
    enabled: false

  # --------------------------------------------------------------------------
  # Tier 2 — Quality Financial Press
  # --------------------------------------------------------------------------

  - name: ft-markets-rss
    adapter: rss
    tier: 2
    url: https://www.ft.com/markets?format=rss
    poll_interval: "15m"
    doc_type: article
    processing_mode: hot
    field_mappings: {}
    auth: {}
    expects:
      title: true
      url: true
      body: true
    enabled: true
