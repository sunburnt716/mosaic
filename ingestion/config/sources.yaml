# Source registry — the single place where all ingestion sources are declared.
#
# This file is DATA, not code. Each entry is validated against SourceConfig
# (core/source_config.py) at startup. The engine loads this file; no restart
# or code change is needed to add, remove, or disable a source.
#
# Adding a source: add an entry here. No new code needed.
# Disabling a source: set enabled: false. The entry is preserved for history.
#
# Tier reference (stamped at ingest on every Document, never inferred later):
#   0 — primary / regulatory  : SEC EDGAR, Fed releases, exchange notices
#   1 — major wire services   : Reuters, AP, Bloomberg wire
#   2 — quality financial press: WSJ, FT, Barron's
#   3 — signal / high-volume  : Reddit, Twitter/X, StockTwits (leading indicator only)
#
# poll_interval format: a single-unit duration string — "30s", "5m", "1h" (one unit only).
# doc_type controls downstream chunking: "article" = by paragraph, "filing" = by section.
# field_mappings: maps schema field names → adapter-specific payload keys.
#   e.g. {"body": "summary"} means the adapter's "summary" key → Document.body.
# auth: adapter-specific credentials. In production, inject secrets via env vars
#   rather than storing them here in plain text.
#
# Sources are listed in tier order (most trusted first) for readability.

sources:
  # --------------------------------------------------------------------------
  # Tier 0 — Primary / Regulatory
  # --------------------------------------------------------------------------

  - name: sec-edgar-8k
    adapter: edgar
    tier: 0
    url: https://efts.sec.gov/LATEST/search-index?forms=8-K
    poll_interval: "1h"
    doc_type: filing
    field_mappings:
      title: entity_name
      published_date: filed_at
      body: document_text
      url: filing_url
    auth: {}
    enabled: true
    params:
      form_types: ["8-K", "8-K/A"]

  # --------------------------------------------------------------------------
  # Tier 1 — Major Wire Services
  # --------------------------------------------------------------------------

  - name: reuters-business-rss
    adapter: rss
    tier: 1
    url: https://feeds.reuters.com/reuters/businessNews
    poll_interval: "5m"
    doc_type: article
    field_mappings:
      title: title
      body: summary
      published_date: published
      url: link
    auth: {}
    enabled: true

  - name: ap-markets-rss
    adapter: rss
    tier: 1
    url: https://apnews.com/hub/financial-markets/rss
    poll_interval: "5m"
    doc_type: article
    field_mappings:
      title: title
      body: summary
      published_date: published
      url: link
    auth: {}
    # Disabled until feed URL is confirmed stable.
    enabled: false

  # --------------------------------------------------------------------------
  # Tier 2 — Quality Financial Press
  # --------------------------------------------------------------------------

  - name: ft-markets-rss
    adapter: rss
    tier: 2
    url: https://www.ft.com/markets?format=rss
    poll_interval: "15m"
    doc_type: article
    field_mappings:
      title: title
      body: summary
      published_date: published
      url: link
    auth: {}
    enabled: false
